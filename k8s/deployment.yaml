apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbornet-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harbornet
  template:
    metadata:
      labels:
        app: harbornet
    spec:
      containers:
        - name: harbornet-app
          image: localhost/harbornet-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
